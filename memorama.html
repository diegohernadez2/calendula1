<script>

const imagenes=[
"memorama1.jpg",
"memorama2.jpg",
"memorama3.jpg",
"memorama4.jpg",
"memorama5.jpg",
"memorama6.jpg"
];

let cartas=[...imagenes,...imagenes];

cartas.sort(()=>Math.random()-0.5);

const tablero=document.getElementById("tablero");

const mensaje=document.getElementById("mensaje");

let seleccion=[];

let bloqueado=false;

function aviso(txt){

mensaje.innerText=txt;

mensaje.style.display="block";

setTimeout(()=>mensaje.style.display="none",1200);

}

cartas.forEach(img=>{

let div=document.createElement("div");

div.classList.add("carta");

div.innerHTML=`<img src="img/${img}">`;

div.onclick=()=>{

if(
bloqueado ||
div.classList.contains("mostrar") ||
div.classList.contains("bien")
)return;

div.classList.add("mostrar");

seleccion.push(div);

if(seleccion.length===2){

bloqueado=true;

setTimeout(verificar,800);

}

};

tablero.appendChild(div);

});

function verificar(){

let [a,b]=seleccion;

let imgA=a.querySelector("img").src;

let imgB=b.querySelector("img").src;

if(imgA===imgB){

a.classList.add("bien");

b.classList.add("bien");

aviso("Sigue así");

}else{

a.classList.remove("mostrar");

b.classList.remove("mostrar");

aviso("Sigue así");

}

seleccion=[];

bloqueado=false;

if(document.querySelectorAll(".bien").length===cartas.length){

aviso("Ganaste");

}

}

for(let i=0;i<25;i++){

let e=document.createElement("img");

e.src="img/estrelladeco.gif";

e.classList.add("estrella");

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(e);

}

</script>
